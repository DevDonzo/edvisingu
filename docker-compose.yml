version: "3.9"

x-agent-defaults: &agent-defaults
  env_file: .env
  restart: always
  volumes:
    - /srv/agent-bus:/agent-bus

services:
  fastapi-router:
    build: ./fastapi-router
    ports:
      - "8000:8000"
    env_file: .env
    restart: always
    depends_on:
      - redis

  hermes-core:
    <<: *agent-defaults
    build: ./vps-agents/agents/hermes-core
    ports:
      - "8001:8000"
    volumes:
      - /srv/hermes-core/data:/data
      - /srv/agent-bus:/agent-bus

  hermes-content:
    <<: *agent-defaults
    build: ./vps-agents/agents/hermes-content
    ports:
      - "8002:8000"
    volumes:
      - /srv/hermes-content/data:/data
      - /srv/agent-bus:/agent-bus

  hermes-advisor:
    <<: *agent-defaults
    build: ./vps-agents/agents/hermes-advisor
