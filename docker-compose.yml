      - /srv/agent-bus:/agent-bus

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    env_file: .env
    restart: always

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    env_file: .env
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8800:8000"
    volumes:
      - chroma-data:/chroma/chroma
    restart: always

  uptime-kuma:
    image: louislam/uptime-kuma:1
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
    restart: always

volumes:
  open-webui-data:
  n8n-data:
  redis-data:
  chroma-data:
  uptime-kuma-data:
