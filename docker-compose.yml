# Generated to use TWO shared images (Dockerfile.router + Dockerfile.agent)
# instead of 25 duplicate build contexts. Each agent service is the same image
# parameterized by AGENT_NAME. Edit the fleet in core/fleet.py, not here.

services:
  router:
    build:
      context: .
      dockerfile: Dockerfile.router
    image: edvisingu/router
    container_name: router
    ports:
      - "8000:8000"
    env_file: .env
    restart: always
    depends_on:
      - redis

  hermes-core:
    build:
      context: .
      dockerfile: Dockerfile.agent
    image: edvisingu/agent
    container_name: hermes-core
    environment:
      - AGENT_NAME=hermes-core
    ports:
      - "8001:8000"
    env_file: .env
    restart: always
    volumes:
      - /srv/agent-bus:/agent-bus

  hermes-content:
